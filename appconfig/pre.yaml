---
environment: production
environmentCode: pre
container:
  messageQueueHost: PREFFCINFSB1001.servicebus.windows.net
  processingActive: true
  azureStorageAccountName: preffcpayst1001
  paymentTopicAddress: ffc-pay-request-pre
  eventsTopicAddress: ffc-pay-events-pre
  azureStorageConnectionString: dummy
  azureStorageUseConnectionString: false
  azureStorageCreateContainers: false
  pollingInterval: 10000
  maxProcessingTries: 500
  disableSequenceValidation: false
postgresService:
  postgresDb: ffc-pay-batch-processor-pre
  postgresqlHost: preffcdbssq1001.postgres.database.azure.com
  postgresPort: 5432
  postgresSchema: public
secretProviderClass:
  azure:
    keyvaultName: PREFFCINFKV1001
    objects:
      - objectName: pre-ffcahwr-appInsights-connectionString
        objectType: secret
      - objectName: pre-postgresPayBatchProcessorUser
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-batch-processor
      type: Opaque
      data:
        - objectName: pre-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTION_STRING
        - objectName: pre-postgresPayBatchProcessorUser
          key: POSTGRES_USERNAME
