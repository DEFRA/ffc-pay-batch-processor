environment: development
environmentCode:
name: ffc-pay-batch-processor
namespace: ffc-pay
workstream: ffc-pay
image: ffc-pay-batch-processor

labels: {}

appInsights:
  connectionString:

containerConfigMap:
  name: ffc-pay-batch-processor-config-map

containerSecret:
  name: ffc-pay-batch-processor-container-secret
  type: Opaque

deployment:
  # DO NOT have more than 1 replica
  # Payment batch files need to be processed in order
  # So concurrent processing with multiple pods could cause problems
  minReplicas: 1
  maxReplicas: 1
  priorityClassName: high

container:
  requestMemory: 100Mi
  requestCpu: 60m
  limitMemory: 500Mi
  limitCpu: 200m
  port: 3017
  azureStorageAccountName: ffcpay
  messageQueueHost: namespace.servicebus.windows.net
  paymentTopicAddress: ffc-pay-request
  eventsTopicAddress: ffc-pay-events
  azureStorageConnectionString: dummy
  azureStorageUseConnectionString: false
  azureStorageCreateContainers: false
  pollingInterval: 10000
  maxProcessingTries: 500
  disableSequenceValidation: false
  processingActive: true

postgresService:
  postgresDb: ffc_pay_batch_processor
  postgresqlHost: ffc-pay-batch-processor-postgres
  postgresPort: 5432
  postgresSchema: public
  postgresUser: postgres

livenessProbe:
  path: /healthz
  port: 3017
  initialDelaySeconds: 70
  periodSeconds: 120
  failureThreshold: 5
  timeoutSeconds: 30

readinessProbe:
  path: /healthy
  port: 3017
  initialDelaySeconds: 60
  periodSeconds: 120
  failureThreshold: 5
  timeoutSeconds: 30

workloadIdentity: true

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-pay-batch-processor
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPINSIGHTS_CONNECTION_STRING # the secret key in the Kubernetes secret and use in the application
